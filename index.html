<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetFugu Auto-Register</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0f0f1e;color:#e0e0e0;padding:16px;max-width:600px;margin:0 auto}
h1{font-size:1.5rem;text-align:center;margin:12px 0 8px}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
input{width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#fff;font-size:0.9rem;margin-bottom:8px}
button{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(135deg,#6c3ce1,#a23ce1);color:#fff;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-bottom:16px}
button:disabled{opacity:0.5;cursor:not-allowed}
#log{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:12px;font-size:0.8rem;font-family:monospace;max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.log-ok{color:#4ade80}
.log-fail{color:#f87171}
.log-info{color:#60a5fa}
.log-step{color:#fbbf24;font-weight:bold}
.log-done{color:#4ade80;font-weight:bold;font-size:1rem}
.ipbox{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:10px;text-align:center;margin-bottom:12px;font-size:0.85rem}
.ipbox span{color:#4ade80;font-weight:bold}
.hint{color:#888;font-size:0.75rem;margin-bottom:12px;text-align:center}
.fab{position:fixed;bottom:16px;right:16px;background:#6c3ce1;color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:1.5rem;cursor:pointer;z-index:99}
</style>
</head>
<body>
<h1>BetFugu Auto-Register</h1>
<div class="sub">Direct from browser | Phone IP | No server</div>
<div class="ipbox">Your IP: <span id="myip">checking...</span></div>
<div class="hint">Partner & userId pre-filled for refer bonus</div>
<input id="partnerInput" type="text" placeholder="Partner (e.g. 66666666)" value="66666666">
<input id="userIdInput" type="text" placeholder="Referrer userId (e.g. 2335316)" value="2335316">
<button id="goBtn" onclick="startBot()">Start Auto-Register</button>
<div id="log"></div>

<script>
const H5='https://h5server.betfuguapi.com';
const GAME='https://game.betfuguapi.com';
const PWD='123456';
const AES_KEY='34d80508ab4a03043f014a66840ba23w';
const AES_IV='585280b3543d2d89';
const VISITOR_ID='MB==d9f771e6f02f464acd2a8ae95601599ff40dfc88202627';
let logEl=document.getElementById('log');
let userIP='unknown';
function addLog(msg,cls){const d=document.createElement('div');d.className=cls||'';d.textContent=msg;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}
async function getIP(){try{const r=await fetch('https://api.ipify.org?format=json');const j=await r.json();userIP=j.ip;document.getElementById('myip').textContent=userIP;addLog('IP: '+userIP,'log-info');}catch(e){document.getElementById('myip').textContent='failed';addLog('IP failed','log-fail');}}
function genPwaUUID(){return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');}
function genPhone(){const first='6789'[Math.floor(Math.random()*4)];let rest='';for(let i=0;i<9;i++)rest+=Math.floor(Math.random()*10);return first+rest;}
async function aesEncrypt(text){const keyData=new TextEncoder().encode(AES_KEY);const ivData=new TextEncoder().encode(AES_IV);const data=new TextEncoder().encode(text);const key=await crypto.subtle.importKey('raw',keyData,{name:'AES-CBC'},false,['encrypt']);const enc=await crypto.subtle.encrypt({name:'AES-CBC',iv:ivData},key,data);return btoa(String.fromCharCode.apply(null,Array.from(new Uint8Array(enc))));}
function buildSourceURL(userId,partner,rtm,pwaUUID,frag){let p='cury=INR&partner='+partner+'&rtm='+rtm;if(userId&&userId!=='undefined')p='userId='+userId+'&'+p;if(pwaUUID)p+='&pwa_uuid='+pwaUUID;return 'https://betfugu02.com/bf_pwa/index.html?'+p+(frag||'#/');}
function h5Headers(token,partner,sourceurl){const h={'accept':'application/json, text/plain, */*','content-type':'application/json;charset=UTF-8','origin':'https://betfugu02.com','referer':'https://betfugu02.com/','user-agent':navigator.userAgent,'language':'en-US','appid':'wecardgame','channel':'test','currency':'INR','version':'2.11.56','timezone':'Asia/Calcutta','timeoffset':'-330','network':'4g','publisher':'release','platform':'Unknown','basepkgname':'h5','pkgname':'h5','osv':'10','weblang':'en-US','weblangs':'en-US,en,en-IN','isfrom':'other_h5','ispwa':'true','webfonts':'Microsoft YaHei','deviceid':'','visitorid':VISITOR_ID,'sourceurl':sourceurl||'https://betfugu02.com/bf_pwa/index.html#/','webrtc':userIP,'trackertoken':'','trackername':''};if(partner)h['partner']=String(partner);if(token)h['access-token']=token;return h;}
function gameHeaders(token){const h={'accept':'*/*','content-type':'application/json','origin':'https://www.betfugu02.com','referer':'https://www.betfugu02.com/','user-agent':navigator.userAgent};if(token)h['access-token']=token;return h;}
async function apiCall(method,host,path,body,token,partner,isGame,sourceurl){const url=host+path;const opts={method,headers:isGame?gameHeaders(token):h5Headers(token,partner,sourceurl),mode:'no-cors'};if(method==='POST')opts.body=JSON.stringify(body||{});try{const r=await fetch(url,opts);return{ok:true,status:r.status,type:r.type};}catch(e){return{ok:false,status:0,error:String(e)};}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function startBot(){const btn=document.getElementById('goBtn');btn.disabled=true;btn.textContent='Running...';logEl.innerHTML='';const partner=document.getElementById('partnerInput').value.trim()||'66666666';const userId=document.getElementById('userIdInput').value.trim()||'';if(!partner){addLog('Partner required!','log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('BetFugu Auto-Register','log-done');addLog('Partner: '+partner,'log-info');if(userId)addLog('Referrer userId: '+userId,'log-info');await getIP();addLog('','');const rtm=String(Date.now());const pwaUUID=genPwaUUID();addLog('pwa_uuid: '+pwaUUID,'log-info');const phone=genPhone();addLog('Phone: '+phone,'log-info');addLog('Password: '+PWD+' (AES)','log-info');addLog('','');const srcNoUUID=buildSourceURL(userId,partner,rtm,null,'#/');const srcUUID=buildSourceURL(userId,partner,rtm,pwaUUID,'#/');const srcLogin=buildSourceURL(userId,partner,rtm,pwaUUID,'#/login');addLog('--- Pre-login sequence ---','log-step');await sleep(500);const r1=await apiCall('POST',H5,'/shorturl',{text:'https://betfugu02.com/app/index.html?userId=undefined&cury=INR&partner=undefined&rtm='+Date.now()},null,partner,false,'https://betfugu02.com/bf_pwa/index.html#/');addLog('shorturl(1): '+(r1.ok?'sent':'FAIL'),r1.ok?'log-ok':'log-fail');const r2=await apiCall('POST',H5,'/opendata/getdaylyjackpot',{id:'daylyJackpot',version:'1'},null,partner,false,srcNoUUID);addLog('daylyJackpot: '+(r2.ok?'sent':'FAIL'),r2.ok?'log-ok':'log-fail');const r3=await apiCall('POST',H5,'/opendata/homepage/indexV4',{},null,partner,false,srcNoUUID);addLog('indexV4 (no uuid): '+(r3.ok?'sent':'FAIL'),r3.ok?'log-ok':'log-fail');await sleep(1000);const r4=await apiCall('POST',H5,'/shorturl',{text:'https://betfugu02.com/app/index.html?userId=undefined&cury=INR&partner=undefined&rtm='+Date.now()},null,partner,false,'https://betfugu02.com/bf_pwa/index.html#/');addLog('shorturl(2): '+(r4.ok?'sent':'FAIL'),r4.ok?'log-ok':'log-fail');const r5=await apiCall('POST',H5,'/opendata/homepage/indexV4',{},null,partner,false,srcUUID);addLog('indexV4 (uuid): '+(r5.ok?'sent':'FAIL'),r5.ok?'log-ok':'log-fail');const r6=await apiCall('POST',H5,'/opendata/getdaylyjackpot',{id:'daylyJackpot',version:'1'},null,partner,false,srcUUID);addLog('daylyJackpot(2): '+(r6.ok?'sent':'FAIL'),r6.ok?'log-ok':'log-fail');const r7=await apiCall('GET',H5,'/opendata/gameConfigs',null,null,partner,false,srcUUID);addLog('gameConfigs: '+(r7.ok?'sent':'FAIL'),r7.ok?'log-ok':'log-fail');await sleep(1000);const r8=await apiCall('POST',H5,'/opendata/itemConfig',{},null,partner,false,srcLogin);addLog('itemConfig: '+(r8.ok?'sent':'FAIL'),r8.ok?'log-ok':'log-fail');addLog('','');await sleep(2000);addLog('Encrypting password...','log-step');let encPwd;try{encPwd=await aesEncrypt(PWD);addLog('AES encrypt: OK '+encPwd,'log-ok');}catch(e){addLog('AES FAIL: '+e.message,'log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('','');addLog('--- Register ---','log-step');const regBody={account:phone,password:encPwd,partner:parseInt(partner),itemuserfor:'freespin'};addLog('Body: '+JSON.stringify(regBody),'log-info');const rr=await apiCall('POST',H5,'/user/register/account',regBody,null,partner,false,srcLogin);if(!rr.ok){addLog('Register REQUEST FAIL: '+JSON.stringify(rr),'log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('1. Register: sent (no-cors, response hidden)','log-ok');await sleep(1500);const lr=await apiCall('POST',H5,'/user/login/account',{account:phone,password:encPwd},null,partner,false,srcLogin);if(!lr.ok){addLog('Login REQUEST FAIL: '+JSON.stringify(lr),'log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('2. Login: sent (no-cors, response hidden)','log-ok');addLog('NOTE: no-cors mode means we cant read token from response.','log-info');addLog('But API calls are being sent from your phone IP!','log-info');addLog('','');addLog('--- Post-register (fire-and-forget) ---','log-step');const fakeToken='no-cors-no-token';const fp=await apiCall('POST',H5,'/user/profile/getfreepackage',{},fakeToken,partner,false,srcUUID);addLog('4. Free package: '+(fp.ok?'sent':'FAIL'),fp.ok?'log-ok':'log-fail');const cg=await apiCall('POST',H5,'/user/profile/claimRegisterGifts',{},fakeToken,partner,false,srcUUID);addLog('6. Claim gift: '+(cg.ok?'sent':'FAIL'),cg.ok?'log-ok':'log-fail');const sl=await apiCall('POST',H5,'/user/profile/setlanguage',{language:'en-US'},fakeToken,partner,false,srcUUID);addLog('7. Language: '+(sl.ok?'sent':'FAIL'),sl.ok?'log-ok':'log-fail');const sub=await apiCall('POST',GAME,'/freetinygames/freespin/subscribe',{typeid:'freespinbet10'},fakeToken,null,true,'');addLog('8. Subscribe: '+(sub.ok?'sent':'FAIL'),sub.ok?'log-ok':'log-fail');addLog('','');addLog('--- 10 free spins (fire-and-forget) ---','log-step');for(let i=0;i<10;i++){const sr=await apiCall('POST',GAME,'/freetinygames/freespin/bet',{},fakeToken,null,true,'');addLog('Spin '+(i+1)+'/10: '+(sr.ok?'sent':'FAIL'),sr.ok?'log-ok':'log-fail');await sleep(1000);}addLog('','');addLog('All 10 spins sent!','log-done');addLog('Phone: '+phone+' | Password: 123456','log-info');addLog('','');addLog('IMPORTANT: no-cors mode sends requests but cant read responses.','log-info');addLog('Registration + spins ARE being processed on BetFugu server.','log-info');addLog('Check your BetFugu account for refer bonus.','log-info');btn.disabled=false;btn.textContent='Start Auto-Register';}
getIP();
</script>
</body>
</html>
