<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetFugu Auto-Register</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0f0f1e;color:#e0e0e0;padding:16px;max-width:600px;margin:0 auto}
h1{font-size:1.5rem;text-align:center;margin:12px 0 8px}
.sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:16px}
input{width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#fff;font-size:0.9rem;margin-bottom:8px}
button{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(135deg,#6c3ce1,#a23ce1);color:#fff;font-size:1.1rem;font-weight:bold;cursor:pointer;margin-bottom:16px}
button:disabled{opacity:0.5;cursor:not-allowed}
#log{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:12px;font-size:0.8rem;font-family:monospace;max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.log-ok{color:#4ade80}
.log-fail{color:#f87171}
.log-info{color:#60a5fa}
.log-step{color:#fbbf24;font-weight:bold}
.log-done{color:#4ade80;font-weight:bold;font-size:1rem}
.ipbox{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:10px;text-align:center;margin-bottom:12px;font-size:0.85rem}
.ipbox span{color:#4ade80;font-weight:bold}
.hint{color:#888;font-size:0.75rem;margin-bottom:12px;text-align:center}
</style>
</head>
<body>
<h1>BetFugu Auto-Register</h1>
<div class="sub">Browser IP + Server Proxy | No CORS issues</div>
<div class="ipbox">Your IP: <span id="myip">checking...</span></div>
<div class="hint">Partner & userId pre-filled for refer bonus</div>
<input id="referLink" type="text" placeholder="Refer link (optional)" value="">
<input id="partnerInput" type="text" placeholder="Partner (e.g. 66666666)" value="66666666">
<input id="userIdInput" type="text" placeholder="Referrer userId (e.g. 2335316)" value="2335316">
<button id="goBtn" onclick="startBot()">Start Auto-Register</button>
<div id="log"></div>

<script>
const API='/api';
const H5='https://h5server.betfuguapi.com';
const GAME='https://game.betfuguapi.com';
const PWD='123456';
const AES_KEY='34d80508ab4a03043f014a66840ba23w';
const AES_IV='585280b3543d2d89';
const VISITOR_ID='MB==d9f771e6f02f464acd2a8ae95601599ff40dfc88202627';
let logEl=document.getElementById('log');
let userIP='unknown';
function addLog(msg,cls){const d=document.createElement('div');d.className=cls||'';d.textContent=msg;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}
async function getIP(){try{const r=await fetch('https://api.ipify.org?format=json');const j=await r.json();userIP=j.ip;document.getElementById('myip').textContent=userIP;addLog('IP detected: '+userIP,'log-info');}catch(e){document.getElementById('myip').textContent='failed';addLog('IP detection failed','log-fail');}}
function genPwaUUID(){return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');}
function genPhone(){const first='6789'[Math.floor(Math.random()*4)];let rest='';for(let i=0;i<9;i++)rest+=Math.floor(Math.random()*10);return first+rest;}
async function aesEncrypt(text){const keyData=new TextEncoder().encode(AES_KEY);const ivData=new TextEncoder().encode(AES_IV);const data=new TextEncoder().encode(text);const key=await crypto.subtle.importKey('raw',keyData,{name:'AES-CBC'},false,['encrypt']);const enc=await crypto.subtle.encrypt({name:'AES-CBC',iv:ivData},key,data);return btoa(String.fromCharCode.apply(null,Array.from(new Uint8Array(enc))));}
function buildSourceURL(userId,partner,rtm,pwaUUID,frag){let p='cury=INR&partner='+partner+'&rtm='+rtm;if(userId&&userId!=='undefined')p='userId='+userId+'&'+p;if(pwaUUID)p+='&pwa_uuid='+pwaUUID;return 'https://betfugu02.com/bf_pwa/index.html?'+p+(frag||'#/');}
async function proxyCall(host,path,method,body,token,partner,isGame,sourceurl){const payload={host:host,path:path,method:method,body:body||{},token:token||'',partner:partner||'',isGame:!!isGame,headers:{'access-token':token||'','partner':partner||'','sourceurl':sourceurl||'','webrtc':userIP}};try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const text=await r.text();let j;try{j=JSON.parse(text);}catch(e){j={_raw:text};}return j;}catch(e){return{status:0,data:{error:String(e)}};}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function startBot(){const btn=document.getElementById('goBtn');btn.disabled=true;btn.textContent='Running...';logEl.innerHTML='';const partner=document.getElementById('partnerInput').value.trim()||'66666666';const userId=document.getElementById('userIdInput').value.trim()||'';if(!partner){addLog('Partner required!','log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('BetFugu Auto-Register','log-done');addLog('Partner: '+partner,'log-info');if(userId)addLog('Referrer userId: '+userId,'log-info');await getIP();addLog('','');const rtm=String(Date.now());const pwaUUID=genPwaUUID();addLog('pwa_uuid: '+pwaUUID,'log-info');const phone=genPhone();addLog('Phone: '+phone,'log-info');addLog('Password: '+PWD+' (AES)','log-info');addLog('','');const srcNoUUID=buildSourceURL(userId,partner,rtm,null,'#/');const srcUUID=buildSourceURL(userId,partner,rtm,pwaUUID,'#/');const srcLogin=buildSourceURL(userId,partner,rtm,pwaUUID,'#/login');addLog('--- Pre-login sequence ---','log-step');await sleep(1000);const r1=await proxyCall(H5,'/shorturl','POST',{text:'https://betfugu02.com/app/index.html?userId=undefined&cury=INR&partner=undefined&rtm='+Date.now()},null,partner,false,'https://betfugu02.com/bf_pwa/index.html#/');addLog('shorturl(1): '+(r1.status===200?'OK':'FAIL '+r1.status),r1.status===200?'log-ok':'log-fail');const r2=await proxyCall(H5,'/opendata/getdaylyjackpot','POST',{id:'daylyJackpot',version:'1'},null,partner,false,srcNoUUID);addLog('daylyJackpot: '+(r2.status===200?'OK':'FAIL'),r2.status===200?'log-ok':'log-fail');const r3=await proxyCall(H5,'/opendata/homepage/indexV4','POST',{},null,partner,false,srcNoUUID);addLog('indexV4 (no uuid): '+(r3.status===200?'OK':'FAIL '+r3.status),r3.status===200?'log-ok':'log-fail');await sleep(1000);const r4=await proxyCall(H5,'/shorturl','POST',{text:'https://betfugu02.com/app/index.html?userId=undefined&cury=INR&partner=undefined&rtm='+Date.now()},null,partner,false,'https://betfugu02.com/bf_pwa/index.html#/');addLog('shorturl(2): '+(r4.status===200?'OK':'FAIL'),r4.status===200?'log-ok':'log-fail');const r5=await proxyCall(H5,'/opendata/homepage/indexV4','POST',{},null,partner,false,srcUUID);addLog('indexV4 (uuid): '+(r5.status===200?'OK':'FAIL'),r5.status===200?'log-ok':'log-fail');const r6=await proxyCall(H5,'/opendata/getdaylyjackpot','POST',{id:'daylyJackpot',version:'1'},null,partner,false,srcUUID);addLog('daylyJackpot(2): '+(r6.status===200?'OK':'FAIL'),r6.status===200?'log-ok':'log-fail');const r7=await proxyCall(H5,'/opendata/gameConfigs','GET',null,null,partner,false,srcUUID);addLog('gameConfigs: '+(r7.status===200?'OK':'FAIL'),r7.status===200?'log-ok':'log-fail');await sleep(1000);const r8=await proxyCall(H5,'/opendata/itemConfig','POST',{},null,partner,false,srcLogin);addLog('itemConfig: '+(r8.status===200?'OK':'FAIL'),r8.status===200?'log-ok':'log-fail');addLog('','');await sleep(3000);addLog('Encrypting password...','log-step');let encPwd;try{encPwd=await aesEncrypt(PWD);addLog('AES encrypt: OK '+encPwd,'log-ok');}catch(e){addLog('AES FAIL: '+e.message,'log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('','');addLog('--- Register ---','log-step');const regBody={account:phone,password:encPwd,partner:parseInt(partner),itemuserfor:'freespin'};addLog('Body: '+JSON.stringify(regBody),'log-info');const rr=await proxyCall(H5,'/user/register/account','POST',regBody,null,partner,false,srcLogin);addLog('Register resp: '+JSON.stringify(rr).substring(0,300),'log-info');if(rr.status!==200||(rr.data&&rr.data.code!==200)){addLog('Register FAIL: '+JSON.stringify(rr.data),'log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('1. Register: OK','log-ok');await sleep(1000);const lr=await proxyCall(H5,'/user/login/account','POST',{account:phone,password:encPwd},null,partner,false,srcLogin);addLog('Login resp: '+JSON.stringify(lr).substring(0,300),'log-info');if(lr.status!==200||(lr.data&&lr.data.code!==200)){addLog('Login FAIL: '+JSON.stringify(lr.data),'log-fail');btn.disabled=false;btn.textContent='Start Auto-Register';return;}const token=lr.data?lr.data.token:null;if(!token){addLog('Login FAIL: no token','log-fail');addLog('Full: '+JSON.stringify(lr),'log-info');btn.disabled=false;btn.textContent='Start Auto-Register';return;}addLog('2. Login: OK','log-ok');await sleep(500);addLog('--- Post-register ---','log-step');const gr=await proxyCall(H5,'/opendata/homepage/registerGifts','GET',null,token,partner,false,srcUUID);addLog('3. Gift status: '+(gr.status===200?'OK':'FAIL'),gr.status===200?'log-ok':'log-fail');if(gr.status===200)addLog('   Gifts: '+JSON.stringify(gr.data).substring(0,200),'log-info');const fp=await proxyCall(H5,'/user/profile/getfreepackage','POST',{},token,partner,false,srcUUID);addLog('4. Free package: '+(fp.status===200?'OK':'FAIL'),fp.status===200?'log-ok':'log-fail');if(fp.status===200)addLog('   Pkg: '+JSON.stringify(fp.data).substring(0,200),'log-info');const hp=await proxyCall(H5,'/opendata/homepage/indexV4','POST',{},token,partner,false,srcUUID);addLog('5. Homepage: '+(hp.status===200?'OK':'FAIL'),hp.status===200?'log-ok':'log-fail');const cg=await proxyCall(H5,'/user/profile/claimRegisterGifts','POST',{},token,partner,false,srcUUID);addLog('6. Claim gift: '+(cg.status===200?'OK':'FAIL'),cg.status===200?'log-ok':'log-fail');if(cg.status===200)addLog('   Claim: '+JSON.stringify(cg.data).substring(0,200),'log-info');const sl=await proxyCall(H5,'/user/profile/setlanguage','POST',{language:'en-US'},token,partner,false,srcUUID);addLog('7. Language: '+(sl.status===200?'OK':'FAIL'),sl.status===200?'log-ok':'log-fail');const sub=await proxyCall(GAME,'/freetinygames/freespin/subscribe','POST',{typeid:'freespinbet10'},token,null,true,'');addLog('8. Subscribe: '+(sub.status===200?'OK':'FAIL'),sub.status===200?'log-ok':'log-fail');if(sub.status===200)addLog('   Sub: '+JSON.stringify(sub.data).substring(0,200),'log-info');addLog('','');addLog('--- Playing 10 free spins ---','log-step');let totalWin=0;for(let i=0;i<10;i++){const sr=await proxyCall(GAME,'/freetinygames/freespin/bet','POST',{},token,null,true,'');if(sr.status!==200){addLog('Spin '+(i+1)+': FAIL HTTP '+sr.status,'log-fail');break;}const lottery=(sr.data&&sr.data.lotteryGameResult)||{};const gd=lottery.data||{};const win=gd.win||0;const bal=gd.balance||'?';const tycount=(sr.data&&sr.data.tycount)||'?';totalWin+=(typeof win==='number')?win:0;addLog('Spin '+(i+1)+'/10: win='+win+' bal='+bal+' left='+tycount,'log-info');if(tycount===0&&i<9){addLog('No spins left!','log-fail');break;}await sleep(1000);}addLog('','');addLog('Total win: '+totalWin,'log-done');addLog('Done! Registration + 10 free spins complete.','log-done');addLog('Phone: '+phone+' | Password: 123456','log-info');btn.disabled=false;btn.textContent='Start Auto-Register';}
getIP();
</script>
</body>
</html>
